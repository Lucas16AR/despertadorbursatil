name: Reporte diario

on:
  schedule:
    # Horarios en UTC (Argentina es UTC-3, sin horario de verano). Las 4 tandas de datos están
    # ancladas a la rueda real de BYMA (10:30–17:00 ART) más una nocturna; los 2 mensajes de
    # contenido (lección, efemérides) intercalados. En total, 6 mensajes por día.
    # Desfasados unos minutos de la hora/cuarto exacto (Decimosexta tarea, 2026-07-11): GitHub
    # Actions advierte que los `schedule` triggers son best-effort y que la demora se concentra
    # justo en los minutos redondos (:00), por la cantidad de workflows de todo el mundo
    # programados ahí. Correr unos minutos después reduce la chance de quedar en esa cola. Los
    # horarios reales pueden variar unos minutos por esta misma razón — no es un bug si un envío
    # sale un poco después de lo programado.
    - cron: "3 11 * * *"    # 08:00 ART — pre-apertura (datos)
    - cron: "4 14 * * *"    # 11:00 ART — apertura (datos)
    - cron: "7 15 * * *"    # 12:00 ART — lección educativa (contenido)
    - cron: "15 20 * * *"   # 17:15 ART — cierre (datos, ya desfasado)
    - cron: "2 22 * * *"    # 19:00 ART — efemérides (contenido)
    - cron: "30 1 * * *"    # 22:30 ART (01:30 UTC del día siguiente) — panorama del día (datos, ya desfasado)
  workflow_dispatch:
    inputs:
      momento:
        description: "Momento del día para una corrida manual"
        required: false
        default: "pre_apertura"
        type: choice
        options:
          - pre_apertura
          - apertura
          - leccion_educativa
          - cierre
          - efemerides
          - cierre_global

permissions:
  contents: write

# Evita que dos tandas se pisen al commitear el snapshot si una se atrasa y solapa la otra.
concurrency:
  group: reporte-diario
  cancel-in-progress: false

jobs:
  enviar-reporte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Determinar el momento del día
        id: momento
        # El cron que disparó la corrida define la tanda. Los valores llegan por env (no
        # interpolados en el script) para no abrir una vía de inyección de shell.
        env:
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_MOMENTO: ${{ github.event.inputs.momento }}
        run: |
          case "$SCHEDULE" in
            "3 11 * * *")   MOMENTO="pre_apertura" ;;
            "4 14 * * *")   MOMENTO="apertura" ;;
            "7 15 * * *")   MOMENTO="leccion_educativa" ;;
            "15 20 * * *")  MOMENTO="cierre" ;;
            "2 22 * * *")   MOMENTO="efemerides" ;;
            "30 1 * * *")   MOMENTO="cierre_global" ;;
            *)              MOMENTO="${INPUT_MOMENTO:-pre_apertura}" ;;
          esac
          echo "Momento resuelto: $MOMENTO"
          echo "momento=$MOMENTO" >> "$GITHUB_OUTPUT"

      - run: python main.py
        env:
          MOMENTO: ${{ steps.momento.outputs.momento }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BCRA_API_TOKEN: ${{ secrets.BCRA_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Guardar snapshot para el próximo reporte
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data/
          git diff --cached --quiet || git commit -m "Actualizar snapshot del reporte diario"
          git push
